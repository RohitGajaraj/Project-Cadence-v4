<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Cadence favicon — the bilateral Butterfly mark (CadenceMark geometry,
       Primitives.tsx) on the parchment tile. The wing flutter is the
       sanctioned 3.2s motion (DESIGN.md); browsers that animate SVG favicons
       (Firefox) get the subtle flutter, everything else shows the crisp
       static mark. Reduced-motion turns it off. -->
  <style>
    .wr, .wl { transform-box: view-box; transform-origin: 12px 12px; }
    .wr { animation: cad-flutter 3.2s ease-in-out infinite; }
    .wl { animation: cad-flutter 3.2s ease-in-out infinite; }
    @keyframes cad-flutter {
      0%, 100% { transform: scaleX(1); }
      50% { transform: scaleX(0.88); }
    }
    @media (prefers-reduced-motion: reduce) {
      .wr, .wl { animation: none; }
    }
  </style>
  <rect x="0" y="0" width="24" height="24" rx="5.5" fill="#faf7ef"/>
  <g transform="translate(12 12) scale(0.84) translate(-12 -12)">
    <g class="wr">
      <path d="M 12.9 11.2 C 13.6 7.6 16.4 4.9 19.1 4.9 C 21.2 4.9 21.9 6.6 21.0 8.6 C 20.0 10.8 16.9 12.4 13.4 12.2 Z" fill="#c2622e" opacity="0.85"/>
      <path d="M 13.2 12.9 C 16.1 12.9 18.6 14.3 19.2 16.2 C 19.7 17.9 18.4 19.1 16.5 18.6 C 14.6 18.1 13.1 16.0 12.9 13.4 Z" fill="#dfb456" opacity="0.85"/>
    </g>
    <g class="wl">
      <path d="M 12.9 11.2 C 13.6 7.6 16.4 4.9 19.1 4.9 C 21.2 4.9 21.9 6.6 21.0 8.6 C 20.0 10.8 16.9 12.4 13.4 12.2 Z" fill="#c2622e" opacity="0.85" transform="scale(-1 1) translate(-24 0)"/>
      <path d="M 13.2 12.9 C 16.1 12.9 18.6 14.3 19.2 16.2 C 19.7 17.9 18.4 19.1 16.5 18.6 C 14.6 18.1 13.1 16.0 12.9 13.4 Z" fill="#dfb456" opacity="0.85" transform="scale(-1 1) translate(-24 0)"/>
    </g>
    <path d="M 12 6.8 C 12.35 8.2 12.35 15.8 12 18.0 C 11.65 15.8 11.65 8.2 12 6.8 Z" fill="#2b211a" opacity="0.95"/>
    <circle cx="12" cy="6.1" r="0.95" fill="#2b211a" opacity="0.95"/>
  </g>
</svg>
